<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로아 파티빌더</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #c9a84c;
  --gold-light: #f0d080;
  --gold-dark: #8a6e2f;
  --bg-deep: #080c14;
  --bg-card: #0e1520;
  --bg-card2: #121c2a;
  --bg-panel: #0a1018;
  --border: rgba(201,168,76,0.18);
  --border-hover: rgba(201,168,76,0.5);
  --text: #d4c8a8;
  --text-muted: #7a7060;
  --dealer: #e05a5a;
  --dealer-bg: rgba(224,90,90,0.12);
  --support: #5ab8e0;
  --support-bg: rgba(90,184,224,0.12);
  --success: #5ae0a0;
  --success-bg: rgba(90,224,160,0.1);
  --shadow: 0 8px 40px rgba(0,0,0,0.7);
  --glow: 0 0 20px rgba(201,168,76,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG pattern */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,0.06) 0%, transparent 60%),
    repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(201,168,76,0.03) 60px),
    repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(201,168,76,0.03) 60px);
  pointer-events:none;
  z-index:0;
}

/* ─── HEADER ─── */
header {
  position:relative;
  z-index:10;
  border-bottom: 1px solid var(--border);
  background: rgba(8,12,20,0.95);
  backdrop-filter: blur(12px);
  padding: 0 32px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:64px;
}
.logo {
  font-family:'Orbitron',sans-serif;
  font-size:18px;
  font-weight:900;
  color:var(--gold);
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow: 0 0 20px rgba(201,168,76,0.4);
}
.logo span { color:#fff; }
.header-sub {
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:2px;
}

/* ─── NAV TABS ─── */
nav {
  position:relative;
  z-index:10;
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--bg-panel);
  padding: 0 32px;
  gap:4px;
}
.tab-btn {
  padding:14px 24px;
  background:none;
  border:none;
  color:var(--text-muted);
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  position:relative;
  transition:color .2s;
  letter-spacing:.5px;
}
.tab-btn::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background:var(--gold);
  transform:scaleX(0);
  transition:transform .25s;
}
.tab-btn.active { color:var(--gold-light); }
.tab-btn.active::after { transform:scaleX(1); }
.tab-btn:hover:not(.active) { color:var(--text); }

/* ─── MAIN ─── */
main {
  position:relative;
  z-index:1;
  max-width:1200px;
  margin:0 auto;
  padding:32px 24px;
}

.tab-pane { display:none; }
.tab-pane.active { display:block; }

/* ─── SECTION TITLE ─── */
.section-title {
  font-family:'Orbitron',sans-serif;
  font-size:12px;
  letter-spacing:3px;
  color:var(--gold);
  text-transform:uppercase;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:12px;
}
.section-title::after {
  content:'';
  flex:1;
  height:1px;
  background:linear-gradient(90deg, var(--border) 0%, transparent 100%);
}

/* ─── CARDS ─── */
.card {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:8px;
  padding:24px;
  margin-bottom:16px;
  box-shadow: var(--shadow);
}
.card:hover { border-color:var(--border-hover); }

/* ─── FORM ─── */
.form-row {
  display:grid;
  gap:12px;
  margin-bottom:12px;
}
.form-row.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr auto; }
.form-row.cols-5 { grid-template-columns: 1fr 1fr 1fr 1fr 1fr auto; }
.form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr auto; }

label {
  display:block;
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:1px;
  margin-bottom:5px;
  text-transform:uppercase;
}
input, select {
  width:100%;
  background:var(--bg-panel);
  border:1px solid var(--border);
  border-radius:4px;
  color:var(--text);
  padding:9px 12px;
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;
  transition:border-color .2s;
  outline:none;
}
input:focus, select:focus { border-color:var(--gold-dark); box-shadow:0 0 0 2px rgba(201,168,76,0.1); }
input::placeholder { color:var(--text-muted); }
select option { background:var(--bg-card); }

.btn {
  padding:9px 18px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  font-size:13px;
  font-weight:700;
  transition:all .2s;
  white-space:nowrap;
  letter-spacing:.5px;
}
.btn-gold {
  background:linear-gradient(135deg,var(--gold-dark),var(--gold));
  color:#080c14;
}
.btn-gold:hover { filter:brightness(1.15); transform:translateY(-1px); box-shadow:0 4px 16px rgba(201,168,76,0.3); }
.btn-red {
  background:rgba(224,90,90,0.15);
  border:1px solid rgba(224,90,90,0.3);
  color:var(--dealer);
}
.btn-red:hover { background:rgba(224,90,90,0.25); }
.btn-blue {
  background:rgba(90,184,224,0.15);
  border:1px solid rgba(90,184,224,0.3);
  color:var(--support);
}
.btn-blue:hover { background:rgba(90,184,224,0.25); }
.btn-big {
  padding:14px 32px;
  font-size:15px;
  border-radius:6px;
  width:100%;
  text-align:center;
  display:block;
}
.btn-ghost {
  background:transparent;
  border:1px solid var(--border);
  color:var(--text-muted);
  font-size:12px;
  padding:6px 12px;
}
.btn-ghost:hover { border-color:var(--border-hover); color:var(--text); }

.form-field { min-width:0; }

/* ─── TABLE ─── */
.data-table {
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}
.data-table th {
  text-align:left;
  font-size:10px;
  letter-spacing:1.5px;
  text-transform:uppercase;
  color:var(--text-muted);
  padding:8px 12px;
  border-bottom:1px solid var(--border);
  font-weight:500;
}
.data-table td {
  padding:10px 12px;
  border-bottom:1px solid rgba(201,168,76,0.06);
  vertical-align:middle;
}
.data-table tr:hover td { background:rgba(201,168,76,0.03); }
.data-table tr:last-child td { border-bottom:none; }

/* ─── BADGES ─── */
.badge {
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  letter-spacing:.5px;
}
.badge-dealer { background:var(--dealer-bg); color:var(--dealer); border:1px solid rgba(224,90,90,0.3); }
.badge-support { background:var(--support-bg); color:var(--support); border:1px solid rgba(90,184,224,0.3); }
.badge-level { background:rgba(201,168,76,0.1); color:var(--gold); border:1px solid rgba(201,168,76,0.2); }

/* ─── PARTY RESULT ─── */
.party-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(340px,1fr));
  gap:16px;
  margin-top:8px;
}
.party-card {
  background:var(--bg-card2);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  box-shadow: var(--shadow);
  transition:border-color .2s, transform .2s;
}
.party-card:hover { border-color:var(--border-hover); transform:translateY(-2px); }
.party-header {
  background:linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid var(--border);
}
.party-name {
  font-family:'Orbitron',sans-serif;
  font-size:12px;
  font-weight:700;
  color:var(--gold-light);
  letter-spacing:1px;
}
.party-avg {
  font-size:11px;
  color:var(--text-muted);
}
.party-avg strong { color:var(--gold); font-size:14px; }
.party-members { padding:14px 18px; }
.member-row {
  display:flex;
  align-items:center;
  gap:10px;
  padding:6px 0;
  border-bottom:1px solid rgba(201,168,76,0.05);
}
.member-row:last-child { border-bottom:none; }
.member-icon {
  width:28px; height:28px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
  flex-shrink:0;
}
.member-icon.d { background:var(--dealer-bg); color:var(--dealer); }
.member-icon.s { background:var(--support-bg); color:var(--support); }
.member-name { flex:1; font-size:13px; font-weight:500; }
.member-meta { font-size:11px; color:var(--text-muted); text-align:right; }
.member-meta .cp { color:var(--gold); font-weight:700; }

/* ─── EMPTY STATE ─── */
.empty {
  text-align:center;
  padding:48px 24px;
  color:var(--text-muted);
  font-size:13px;
}
.empty-icon { font-size:40px; margin-bottom:12px; opacity:.5; }

/* ─── TOAST ─── */
.toast-container {
  position:fixed;
  bottom:24px; right:24px;
  z-index:1000;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.toast {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 18px;
  font-size:13px;
  box-shadow:var(--shadow);
  animation:slideIn .25s ease;
  display:flex; align-items:center; gap:10px;
}
.toast.success { border-color:rgba(90,224,160,0.4); }
.toast.error { border-color:rgba(224,90,90,0.4); color:var(--dealer); }
@keyframes slideIn { from{transform:translateX(40px);opacity:0} to{transform:translateX(0);opacity:1} }

/* ─── STAT CHIPS ─── */
.stat-row {
  display:flex;
  gap:16px;
  margin-bottom:24px;
  flex-wrap:wrap;
}
.stat-chip {
  background:var(--bg-card);
  border:1px solid var(--border);
  border-radius:6px;
  padding:12px 20px;
  display:flex; flex-direction:column;
  gap:2px;
}
.stat-chip .val {
  font-family:'Orbitron',sans-serif;
  font-size:22px;
  font-weight:700;
  color:var(--gold-light);
}
.stat-chip .lbl {
  font-size:10px;
  letter-spacing:1.5px;
  color:var(--text-muted);
  text-transform:uppercase;
}

/* ─── EXPEDITION ─── */
.expedition-group {
  margin-bottom:24px;
}
.expedition-header {
  background:linear-gradient(90deg, rgba(201,168,76,0.1), transparent);
  border:1px solid var(--border);
  border-radius:6px 6px 0 0;
  padding:10px 16px;
  display:flex; align-items:center; gap:10px;
  cursor:pointer;
}
.expedition-name {
  font-weight:700;
  font-size:14px;
  color:var(--gold-light);
  flex:1;
}
.expedition-chars {
  font-size:11px;
  color:var(--text-muted);
}
.expedition-body {
  border:1px solid var(--border);
  border-top:none;
  border-radius:0 0 6px 6px;
  overflow:hidden;
}

/* ─── DIVIDER ─── */
.divider {
  border:none;
  border-top:1px solid var(--border);
  margin:20px 0;
}

.flex-between { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.gap-8 { gap:8px; }
.flex { display:flex; align-items:center; }
.alert {
  padding:12px 16px;
  border-radius:6px;
  font-size:13px;
  margin-bottom:16px;
}
.alert-info { background:rgba(90,184,224,0.08); border:1px solid rgba(90,184,224,0.2); color:var(--support); }
.alert-warn { background:rgba(224,180,90,0.08); border:1px solid rgba(224,180,90,0.2); color:#e0b45a; }

@media(max-width:700px){
  .form-row.cols-4, .form-row.cols-5, .form-row.cols-3 {
    grid-template-columns:1fr 1fr;
  }
  .form-row.cols-4 > *:last-child,
  .form-row.cols-5 > *:last-child,
  .form-row.cols-3 > *:last-child {
    grid-column:1/-1;
  }
  main { padding:16px 12px; }
  nav { padding:0 8px; }
  header { padding:0 16px; }
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<header>
  <div>
    <div class="logo">LOA <span>PARTY</span> BUILDER</div>
  </div>
  <div class="header-sub">AUTO PARTY COMPOSER</div>
</header>

<nav id="mainNav">
  <button class="tab-btn active" data-tab="tab-expedition">⚔ 원정대 관리</button>
  <button class="tab-btn" data-tab="tab-raid">🗡 레이드 관리</button>
  <button class="tab-btn" data-tab="tab-compose">✨ 파티 자동 조합</button>
</nav>

<main>

<!-- ══════════════════════════════════════
     TAB 1: 원정대 관리
══════════════════════════════════════ -->
<div class="tab-pane active" id="tab-expedition">

  <div class="card">
    <div class="section-title">원정대 등록</div>
    <div class="form-row cols-3">
      <div class="form-field">
        <label>원정대 이름</label>
        <input id="expName" type="text" placeholder="ex) 홍길동 원정대">
      </div>
      <div class="form-field" style="grid-column:span 2; display:flex; align-items:flex-end; gap:8px;">
        <button class="btn btn-gold" onclick="addExpedition()" style="flex-shrink:0">원정대 추가</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">캐릭터 추가</div>
    <div class="form-row cols-5">
      <div class="form-field">
        <label>원정대 선택</label>
        <select id="charExpedition">
          <option value="">원정대 선택</option>
        </select>
      </div>
      <div class="form-field">
        <label>닉네임</label>
        <input id="charNick" type="text" placeholder="캐릭터명">
      </div>
      <div class="form-field">
        <label>레벨</label>
        <input id="charLevel" type="number" placeholder="1640" min="0">
      </div>
      <div class="form-field">
        <label>전투력</label>
        <input id="charCP" type="number" placeholder="100000" min="0">
      </div>
      <div class="form-field">
        <label>역할</label>
        <select id="charRole">
          <option value="dealer">딜러</option>
          <option value="support">서폿</option>
        </select>
      </div>
      <div class="form-field" style="display:flex; align-items:flex-end;">
        <button class="btn btn-gold" onclick="addCharacter()" style="width:100%">추가</button>
      </div>
    </div>
  </div>

  <!-- 원정대 목록 -->
  <div id="expeditionList">
    <div class="empty"><div class="empty-icon">⚔️</div>등록된 원정대가 없습니다</div>
  </div>

</div>

<!-- ══════════════════════════════════════
     TAB 2: 레이드 관리
══════════════════════════════════════ -->
<div class="tab-pane" id="tab-raid">

  <div class="card">
    <div class="section-title">레이드 등록</div>
    <div class="form-row cols-4">
      <div class="form-field">
        <label>레이드 이름</label>
        <input id="raidName" type="text" placeholder="ex) 에키드나 노말">
      </div>
      <div class="form-field">
        <label>입장 레벨</label>
        <input id="raidLevel" type="number" placeholder="1620" min="0">
      </div>
      <div class="form-field">
        <label>딜러 인원</label>
        <input id="raidDealers" type="number" placeholder="6" min="1" max="7">
      </div>
      <div class="form-field">
        <label>서폿 인원</label>
        <input id="raidSupports" type="number" placeholder="2" min="0" max="4">
      </div>
      <div class="form-field" style="display:flex; align-items:flex-end;">
        <button class="btn btn-gold" onclick="addRaid()" style="width:100%">등록</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="flex-between">
      <div class="section-title" style="margin-bottom:0">등록된 레이드</div>
    </div>
    <div id="raidTableWrap">
      <div class="empty"><div class="empty-icon">🗡️</div>등록된 레이드가 없습니다</div>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════
     TAB 3: 파티 자동 조합
══════════════════════════════════════ -->
<div class="tab-pane" id="tab-compose">

  <div class="card">
    <div class="section-title">레이드 선택</div>
    <div class="form-row cols-3">
      <div class="form-field">
        <label>레이드</label>
        <select id="composeRaid">
          <option value="">레이드를 선택하세요</option>
        </select>
      </div>
      <div class="form-field" style="display:flex; align-items:flex-end; gap:8px;">
        <button class="btn btn-gold btn-big" onclick="composeParties()" style="width:auto; padding:9px 28px;">파티 자동 조합 시작</button>
      </div>
    </div>
    <div id="raidInfoChips" style="display:none" class="stat-row"></div>
  </div>

  <div id="composeResult"></div>

</div>

</main>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, remove, push, onValue }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDPIMLD5b4RO5SxSUbZgUu12xUxiUGmS9s",
  authDomain: "lostark-party-build.firebaseapp.com",
  databaseURL: "https://lostark-party-build-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "lostark-party-build",
  storageBucket: "lostark-party-build.firebasestorage.app",
  messagingSenderId: "495176787080",
  appId: "1:495176787080:web:5adec7a58add53176deb3d",
  measurementId: "G-WRHWP92NW9"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── STATE ──
window._expeditions = {};   // {id: {name, chars:{id:{nick,level,cp,role}}}}
window._raids = {};         // {id: {name,level,dealers,supports}}

// ── TOAST ──
window.toast = (msg, type='success') => {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type==='success'?'✓':'✕'}</span>${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 2800);
};

// ── EXPEDITION CRUD ──
window.addExpedition = async () => {
  const name = document.getElementById('expName').value.trim();
  if(!name) return toast('원정대 이름을 입력하세요', 'error');
  const r = ref(db, 'expeditions');
  const newRef = push(r);
  await set(newRef, { name, chars:{} });
  document.getElementById('expName').value = '';
  toast(`원정대 "${name}" 등록 완료`);
};

window.deleteExpedition = async (id) => {
  if(!confirm('원정대를 삭제하시겠습니까? 소속 캐릭터도 모두 삭제됩니다.')) return;
  await remove(ref(db, `expeditions/${id}`));
  toast('원정대 삭제 완료');
};

// ── CHARACTER CRUD ──
window.addCharacter = async () => {
  const expId = document.getElementById('charExpedition').value;
  const nick  = document.getElementById('charNick').value.trim();
  const level = parseInt(document.getElementById('charLevel').value);
  const cp    = parseInt(document.getElementById('charCP').value);
  const role  = document.getElementById('charRole').value;
  if(!expId) return toast('원정대를 선택하세요','error');
  if(!nick)  return toast('닉네임을 입력하세요','error');
  if(!level || level<0) return toast('레벨을 입력하세요','error');
  if(!cp || cp<0) return toast('전투력을 입력하세요','error');

  const r = ref(db, `expeditions/${expId}/chars`);
  const newRef = push(r);
  await set(newRef, { nick, level, cp, role });
  document.getElementById('charNick').value='';
  document.getElementById('charLevel').value='';
  document.getElementById('charCP').value='';
  toast(`"${nick}" 캐릭터 추가 완료`);
};

window.deleteChar = async (expId, charId) => {
  await remove(ref(db, `expeditions/${expId}/chars/${charId}`));
  toast('캐릭터 삭제 완료');
};

// ── RAID CRUD ──
window.addRaid = async () => {
  const name     = document.getElementById('raidName').value.trim();
  const level    = parseInt(document.getElementById('raidLevel').value);
  const dealers  = parseInt(document.getElementById('raidDealers').value);
  const supports = parseInt(document.getElementById('raidSupports').value);
  if(!name) return toast('레이드 이름을 입력하세요','error');
  if(!level) return toast('입장 레벨을 입력하세요','error');
  if(isNaN(dealers)||dealers<1) return toast('딜러 인원을 입력하세요','error');
  if(isNaN(supports)||supports<0) return toast('서폿 인원을 입력하세요','error');
  const r = push(ref(db,'raids'));
  await set(r, { name, level, dealers, supports });
  ['raidName','raidLevel','raidDealers','raidSupports'].forEach(id=>document.getElementById(id).value='');
  toast(`레이드 "${name}" 등록 완료`);
};

window.deleteRaid = async (id) => {
  if(!confirm('레이드를 삭제하시겠습니까?')) return;
  await remove(ref(db,`raids/${id}`));
  toast('레이드 삭제 완료');
};

// ── REALTIME LISTENERS ──
onValue(ref(db,'expeditions'), snap => {
  window._expeditions = snap.val() || {};
  renderExpeditions();
  updateExpeditionSelect();
});

onValue(ref(db,'raids'), snap => {
  window._raids = snap.val() || {};
  renderRaids();
  updateRaidSelect();
});

// ── RENDER EXPEDITIONS ──
function renderExpeditions() {
  const el = document.getElementById('expeditionList');
  const exps = window._expeditions;
  if(!Object.keys(exps).length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">⚔️</div>등록된 원정대가 없습니다</div>';
    return;
  }
  el.innerHTML = Object.entries(exps).map(([id, exp]) => {
    const chars = exp.chars || {};
    const charList = Object.entries(chars);
    const dealers  = charList.filter(([,c])=>c.role==='dealer').length;
    const supports = charList.filter(([,c])=>c.role==='support').length;

    const rows = charList.length ? charList.map(([cid,c]) => `
      <tr>
        <td><span class="badge ${c.role==='dealer'?'badge-dealer':'badge-support'}">${c.role==='dealer'?'딜러':'서폿'}</span></td>
        <td style="font-weight:500">${c.nick}</td>
        <td><span class="badge badge-level">Lv.${c.level}</span></td>
        <td style="color:var(--gold);font-weight:700">${Number(c.cp).toLocaleString()}</td>
        <td><button class="btn btn-red" style="padding:4px 10px;font-size:11px" onclick="deleteChar('${id}','${cid}')">삭제</button></td>
      </tr>
    `).join('') : `<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:16px">캐릭터가 없습니다</td></tr>`;

    return `
    <div class="expedition-group">
      <div class="expedition-header">
        <div class="expedition-name">⚔ ${exp.name}</div>
        <span class="expedition-chars" style="color:var(--dealer)">딜러 ${dealers}</span>
        <span class="expedition-chars" style="color:var(--support);margin-left:8px">서폿 ${supports}</span>
        <span class="expedition-chars" style="margin-left:16px">총 ${charList.length}캐릭</span>
        <button class="btn btn-red btn-ghost" style="margin-left:12px;padding:4px 10px;font-size:11px"
          onclick="deleteExpedition('${id}')">원정대 삭제</button>
      </div>
      <div class="expedition-body">
        <table class="data-table">
          <thead>
            <tr>
              <th>역할</th><th>닉네임</th><th>레벨</th><th>전투력</th><th></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

// ── RENDER RAIDS ──
function renderRaids() {
  const el = document.getElementById('raidTableWrap');
  const raids = window._raids;
  if(!Object.keys(raids).length) {
    el.innerHTML='<div class="empty"><div class="empty-icon">🗡️</div>등록된 레이드가 없습니다</div>';
    return;
  }
  el.innerHTML = `<table class="data-table">
    <thead><tr>
      <th>레이드 이름</th><th>입장 레벨</th><th>파티 규모</th><th>딜러</th><th>서폿</th><th></th>
    </tr></thead>
    <tbody>
    ${Object.entries(raids).map(([id,r])=>`
      <tr>
        <td style="font-weight:700;color:var(--gold-light)">${r.name}</td>
        <td><span class="badge badge-level">Lv.${r.level}</span></td>
        <td style="color:var(--text-muted)">${r.dealers+r.supports}인</td>
        <td><span style="color:var(--dealer);font-weight:700">딜러 ${r.dealers}명</span></td>
        <td><span style="color:var(--support);font-weight:700">서폿 ${r.supports}명</span></td>
        <td><button class="btn btn-red" style="padding:4px 10px;font-size:11px" onclick="deleteRaid('${id}')">삭제</button></td>
      </tr>
    `).join('')}
    </tbody>
  </table>`;
}

// ── SELECT UPDATES ──
function updateExpeditionSelect() {
  const sel = document.getElementById('charExpedition');
  const cur = sel.value;
  const exps = window._expeditions;
  sel.innerHTML = '<option value="">원정대 선택</option>' +
    Object.entries(exps).map(([id,e])=>`<option value="${id}" ${id===cur?'selected':''}>${e.name}</option>`).join('');
}

function updateRaidSelect() {
  const sel = document.getElementById('composeRaid');
  const cur = sel.value;
  const raids = window._raids;
  sel.innerHTML = '<option value="">레이드를 선택하세요</option>' +
    Object.entries(raids).map(([id,r])=>`<option value="${id}" ${id===cur?'selected':''}>${r.name} (Lv.${r.level} / ${r.dealers}딜+${r.supports}서폿)</option>`).join('');
}

// ── TAB SWITCH ──
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab).classList.add('active');
  });
});

// ── PARTY COMPOSE ALGORITHM ──
window.composeParties = () => {
  const raidId = document.getElementById('composeRaid').value;
  if(!raidId) return toast('레이드를 선택하세요','error');

  const raid = window._raids[raidId];
  const exps = window._expeditions;

  // Collect all chars grouped by expedition
  // rule: 한 파티에 한 원정대 캐릭터만 1명
  let allChars = []; // {expId, charId, nick, level, cp, role}
  Object.entries(exps).forEach(([expId, exp])=>{
    const chars = exp.chars || {};
    Object.entries(chars).forEach(([cid,c])=>{
      if(c.level >= raid.level) {
        allChars.push({ expId, charId:cid, expName:exp.name, nick:c.nick, level:c.level, cp:c.cp, role:c.role });
      }
    });
  });

  const dealers  = allChars.filter(c=>c.role==='dealer');
  const supports = allChars.filter(c=>c.role==='support');

  const partySize = raid.dealers + raid.supports;
  const infoEl = document.getElementById('raidInfoChips');
  infoEl.style.display='flex';
  infoEl.innerHTML = `
    <div class="stat-chip"><div class="val">${dealers.length}</div><div class="lbl">참여 딜러</div></div>
    <div class="stat-chip"><div class="val">${supports.length}</div><div class="lbl">참여 서폿</div></div>
    <div class="stat-chip"><div class="val">${partySize}인</div><div class="lbl">파티 규모</div></div>
    <div class="stat-chip"><div class="val">${raid.level}</div><div class="lbl">입장 레벨</div></div>
  `;

  // 1) Sort dealers by CP desc → split into groups of raid.dealers
  const sortedDealers = [...dealers].sort((a,b)=>b.cp-a.cp);
  const dealerGroups = [];
  for(let i=0; i<sortedDealers.length; i+=raid.dealers) {
    const grp = sortedDealers.slice(i, i+raid.dealers);
    if(grp.length === raid.dealers) dealerGroups.push(grp);
  }

  // 2) For each dealer group, compute avg CP; assign supports closest to that avg
  //    constraint: 한 파티에 같은 원정대 캐릭 2명 이상 불가
  const usedSupports = new Set();
  const parties = [];

  dealerGroups.forEach((dGrp, idx) => {
    const usedExpIds = new Set(dGrp.map(c=>c.expId));
    const avgCP = Math.round(dGrp.reduce((s,c)=>s+Number(c.cp),0)/dGrp.length);

    // Pick supports not yet used, not from same expedition
    const available = supports.filter(s=>
      !usedSupports.has(s.charId) && !usedExpIds.has(s.expId)
    );

    // Sort by CP closest to avg
    const sorted = [...available].sort((a,b)=>
      Math.abs(a.cp-avgCP) - Math.abs(b.cp-avgCP)
    );
    const picked = sorted.slice(0, raid.supports);
    picked.forEach(s=>usedSupports.add(s.charId));

    const allMembers = [...dGrp, ...picked];
    const fullAvg = allMembers.length
      ? Math.round(allMembers.reduce((s,c)=>s+Number(c.cp),0)/allMembers.length)
      : avgCP;

    parties.push({ idx:idx+1, dealers:dGrp, supports:picked, avgCP, fullAvg });
  });

  // Render result
  const resultEl = document.getElementById('composeResult');
  if(!parties.length) {
    resultEl.innerHTML=`<div class="card"><div class="alert alert-warn">
      ⚠️ 레이드 레벨 조건(Lv.${raid.level})을 충족하는 딜러가 충분하지 않습니다.<br>
      딜러 최소 ${raid.dealers}명 필요 / 현재 적합 딜러: ${dealers.length}명
    </div></div>`;
    return;
  }

  const incomplete = parties.filter(p=>p.supports.length < raid.supports);
  const warningHtml = incomplete.length ? `<div class="alert alert-warn" style="margin-bottom:16px">
    ⚠️ ${incomplete.length}개 파티에 서폿 인원이 부족합니다. (조건 충족 서폿 부족)
  </div>` : '';

  resultEl.innerHTML = `
    <div class="section-title" style="margin-top:8px">${raid.name} — 자동 조합 결과</div>
    ${warningHtml}
    <div class="party-grid">
    ${parties.map(p => {
      const allM = [...p.dealers, ...p.supports];
      const supportShort = raid.supports - p.supports.length;
      return `
      <div class="party-card">
        <div class="party-header">
          <div class="party-name">PARTY ${p.idx}</div>
          <div class="party-avg">딜러 평균 전투력 <strong>${p.avgCP.toLocaleString()}</strong></div>
        </div>
        <div class="party-members">
          ${p.dealers.map(c=>`
            <div class="member-row">
              <div class="member-icon d">D</div>
              <div>
                <div class="member-name">${c.nick}</div>
                <div style="font-size:11px;color:var(--text-muted)">${c.expName}</div>
              </div>
              <div class="member-meta">
                <div class="cp">${Number(c.cp).toLocaleString()}</div>
                <div>Lv.${c.level}</div>
              </div>
            </div>
          `).join('')}
          ${p.supports.map(c=>`
            <div class="member-row">
              <div class="member-icon s">S</div>
              <div>
                <div class="member-name">${c.nick}</div>
                <div style="font-size:11px;color:var(--text-muted)">${c.expName}</div>
              </div>
              <div class="member-meta">
                <div class="cp" style="color:var(--support)">${Number(c.cp).toLocaleString()}</div>
                <div>Lv.${c.level}</div>
              </div>
            </div>
          `).join('')}
          ${supportShort > 0 ? `<div class="member-row" style="opacity:.4">
            <div class="member-icon s" style="opacity:.4">?</div>
            <div style="color:var(--text-muted);font-size:12px">서폿 ${supportShort}명 부족</div>
          </div>`.repeat(supportShort) : ''}
        </div>
      </div>`;
    }).join('')}
    </div>
    <div style="margin-top:20px">
      <div class="alert alert-info">
        💡 총 <strong>${parties.length}개 파티</strong> 조합 완료 
        (참여 딜러 ${parties.reduce((s,p)=>s+p.dealers.length,0)}명 / 서폿 ${parties.reduce((s,p)=>s+p.supports.length,0)}명)
        <br>조합 기준: 전투력 높은 딜러순 그룹 → 딜러 평균 전투력에 가장 근접한 서폿 배정 (동일 원정대 중복 제한)
      </div>
    </div>
  `;
  toast(`${parties.length}개 파티 조합 완료!`);
};

</script>
